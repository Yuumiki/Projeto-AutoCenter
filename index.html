<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCenter Manager – Login</title>
    
    <!-- Bootstrap Básico -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f4f6f9; /* Fundo cinza claro padrão */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 15px;
        }

        .login-error {
            display: none;
        }

        /* Animação básica de erro */
        .shake {
            animation: shake 0.4s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h4 class="text-center mb-4">Acesso ao Sistema</h4>
                
                <div id="login-error" class="alert alert-danger login-error" role="alert">
                    Usuário ou senha inválidos.
                </div>

                <form id="form-login">
                    <div class="mb-3">
                        <label for="login-user" class="form-label">Usuário</label>
                        <input type="text" class="form-control" id="login-user" placeholder="Digite seu usuário" required>
                    </div>
                    <div class="mb-3">
                        <label for="login-pass" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="login-pass" placeholder="Digite sua senha" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Entrar</button>
                </form>
                
                <div class="text-center mt-3 text-muted" style="font-size: 12px;">
                    Acesso demo: <strong>admin</strong> / <strong>admin</strong>
                </div>
            </div>
        </div>
    </div>

    <!-- Script Central do Projeto -->
    <script src="assets/js/app.js"></script>
</body>
</html>
